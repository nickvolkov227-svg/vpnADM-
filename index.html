<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vpnADM — Premium VPN</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

body {
  margin:0;
  font-family:'Inter',sans-serif;
  background: radial-gradient(circle at top, #120005, #000);
  color:white;
  overflow-x:hidden;
}

/* снег */
.snow span {
  position:absolute;
  width:4px;height:4px;background:white;border-radius:50%;
  animation:fall linear infinite;
}
@keyframes fall {
  0%{transform:translateY(-10px)}
  100%{transform:translateY(100vh)}
}

/* NAV */
.nav {
  padding:15px;
  position:sticky;
  top:0;
  backdrop-filter:blur(10px);
}

.nav-top {
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.burger {
  font-size:28px;
  cursor:pointer;
  display:none;
}

.nav-menu {
  display:flex;
  gap:10px;
}

.btn {
  background:linear-gradient(135deg,#ff2e63,#ff6a3d);
  border:none;
  color:white;
  padding:12px;
  border-radius:12px;
  cursor:pointer;
  transition:.3s;
  font-weight:600;
}

.btn:hover {
  transform:scale(1.08);
  box-shadow:0 0 25px rgba(255,0,80,0.8);
}

/* HEADER */
header {
  text-align:center;
  padding:120px 20px;
}

h1 {
  font-size:64px;
}

/* sections */
section {
  max-width:1100px;
  margin:auto;
  padding:70px 20px;
}

.cards {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
}

.card {
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  transition:.3s;
}

.card:hover {
  transform:translateY(-10px);
  box-shadow:0 0 30px rgba(255,0,80,0.4);
}

/* FAQ */
.faq {
  cursor:pointer;
  margin:10px 0;
  padding:15px;
  background:rgba(255,255,255,0.05);
  border-radius:10px;
}

/* mobile */
@media (max-width:700px){

  .burger { display:block; }

  .nav-menu {
    display:none;
    flex-direction:column;
    margin-top:10px;
  }

  .nav-menu.active { display:flex; }

  .nav-menu .btn { width:100%; }

  h1 { font-size:34px; }

}

</style>
</head>

<body>

<div class="snow" id="snow"></div>

</header>

</div>

  <div class="card">

    <button class="btn" onclick="pay()">Купить</button>
  </div>
  <div class="card">

<section id="contact">

<script>

function toggleMenu(){
  document.getElementById('menu').classList.toggle('active');
}

function go(id){

}

function pay(){
  alert('Подключи Stripe позже');
}

const snow=document.getElementById('snow');
for(let i=0;i<150;i++){
 let s=document.createElement('span');
 s.style.left=Math.random()*100+'%';
 s.style.animationDuration=(3+Math.random()*5)+'s';
 snow.appendChild(s);
}

</script>

</body>
</html>
